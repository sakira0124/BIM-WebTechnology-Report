Write HTML code to display use of iframe tag and image tag.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iframe</title>
</head>
<body>
    <p>Using iframe tag:</p>
    <div class="map">   
        <iframe  src="https://maps.google.com/maps?width=100%25&amp;height=600&amp;hl=en&amp;q=1%20Grafton%20Street,%20Dublin,%20Ireland+(My%20Business%20Name)&amp;t=&amp;z=14&amp;ie=UTF8&amp;iwloc=B&amp;output=embed"><a href="https://www.mapsdirections.info/de/evolkerung-auf-einer-karte-berechnen/">mila</a>
        </iframe>
    </div>
    <p>Using image tag:</p>
    <div class="image">
        <img src="image1.jpg" alt="Sample Image" width="" height="600px">
    </div>
</body>
</html>
